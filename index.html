<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Becha Events - Animation Stage</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --primary-red: #E10600; --dark-text: #2b2b2b; --light-bg: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--light-bg); margin: 0; padding: 0; color: var(--dark-text); display: flex; flex-direction: column; align-items: center; }
        header { background-color: var(--primary-red); color: white; position: sticky; top: 0; z-index: 100; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
        .clock-text { color: white; font-size: 13px; font-weight: 800; background: rgba(255, 255, 255, 0.2); padding: 4px 12px; border-radius: 20px; }
        .logo-text { color: white; font-size: 22px; font-weight: 900; margin: 0; letter-spacing: 1px; }
        .user-badge { color: white; font-weight: bold; font-size: 13px; background: rgba(255, 255, 255, 0.1); padding: 4px 10px; border-radius: 8px; border: 1px solid white; }
        .btn { border: none; border-radius: 10px; padding: 10px 15px; font-family: 'Cairo'; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-red { background: var(--primary-red); color: white; }
        .btn-green { background: #198754; color: white; }
        .btn-dark { background: #333; color: white; }
        .btn-outline { background: white; border: 2px solid var(--primary-red); color: var(--primary-red); }
        .screen { display: none; width: 95%; max-width: 650px; margin-top: 20px; text-align: center; margin-bottom: 50px; }
        .active-screen { display: block; }
        
        /* نظام الأكورديون (الصناديق المطوية) */
        .accordion-item { background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .accordion-header { background: #f8f9fa; padding: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; font-weight: 900; color: #333; }
        .accordion-content { padding: 15px; display: none; text-align: right; }
        .accordion-content.open { display: block; }

        /* سطر البرنامج في الكواليس */
        .prog-row { position: relative; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; background: #fff; padding: 12px; border: 1px solid #eee; border-radius: 10px; border-right: 5px solid var(--primary-red); }
        .prog-row.locked { opacity: 0.6; border-right-color: #198754; pointer-events: none; }
        .row-num { position: absolute; right: -15px; top: -10px; background: var(--primary-red); color: white; width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; z-index: 5; }
        
        /* البرنامج في الركح */
        .program-item { display: flex; align-items: center; justify-content: space-between; background: white; border: 2px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: right; font-weight: bold; font-size: 18px; transition: 0.3s; cursor: pointer; border-right: 5px solid #ff9800; }
        .program-item.completed { text-decoration: line-through; opacity: 0.5; background: #f8f9fa; border-right-color: #198754; }
        .chk-box { width: 28px; height: 28px; border-radius: 6px; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; color: white; }
        .completed .chk-box { background: #198754; border-color: #198754; }

        input, select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: 'Cairo'; font-size: 14px; }
    </style>
</head>
<body>

    <header id="mainAppHeader" style="display:none;">
        <div class="top-bar">
            <div id="live-clock" class="clock-text">🕒 --:--</div>
            <div class="logo-container">
                <span id="headerUserBadge" class="user-badge"></span>
                <button class="btn btn-dark" style="padding: 5px 10px; font-size: 12px;" onclick="logout()">خروج</button>
            </div>
        </div>
    </header>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="screen active-screen">
        <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h1 style="color: var(--primary-red); margin: 0;">BECHA EVENTS</h1>
            <p style="font-weight: bold; color: #666; margin-bottom: 25px;">إدارة الركح والتنشيط 🎭</p>
            <input type="text" id="loginUser" placeholder="اسم المستخدم" style="width:100%; margin-bottom:15px; text-align:center;"><br>
            <input type="password" id="loginPass" placeholder="كلمة السر" style="width:100%; margin-bottom:20px; text-align:center;"><br>
            <button class="btn btn-red" style="width: 100%;" onclick="login()">دخول</button>
        </div>
    </div>

    <!-- شاشة اختيار العرض -->
    <div id="eventsScreen" class="screen">
        <h2 style="border-bottom: 2px solid var(--primary-red); padding-bottom: 10px;">📅 عروضي القادمة</h2>
        <div id="eventsListContainer"></div>
    </div>

    <!-- لوحة القيادة -->
    <div id="dashboardScreen" class="screen">
        <h2 id="dashInstName" style="color: var(--primary-red); margin: 0;">--</h2>
        <div id="dashEventTime" style="margin-bottom: 20px; font-weight: bold; color: #666;"></div>
        <div class="dashboard-grid" id="dashboardMenu"></div>

        <!-- 1. الكواليس (صناديق مطوية) -->
        <div id="backstageSection" style="display:none; margin-top:20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color:#17a2b8; margin: 0;">🧰 غرفة الكواليس</h3>
                <button class="btn btn-dark" onclick="closeSection()">رجوع</button>
            </div>

            <!-- الصندوق 1: الإدارة -->
            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion('accInst')">
                    <span>👑 معطيات الإدارة والمؤسسة</span>
                    <span id="icon_accInst">➕</span>
                </div>
                <div id="accInst" class="accordion-content">
                    <input type="text" id="instManager" placeholder="المديرة..." style="width:100%; margin-bottom:10px;">
                    <input type="text" id="instFounder" placeholder="باعث المشروع..." style="width:100%; margin-bottom:15px;">
                    <h5 style="color:#198754; margin: 10px 0;">👩‍🏫 المربيات:</h5>
                    <div id="educatorsList"></div>
                    <button class="btn btn-outline" style="width:100%; font-size:12px; margin-top:5px;" onclick="addEducator()">+ مربية</button>
                    <h5 style="color:#ff9800; margin: 15px 0 10px 0;">🎯 المدربون:</h5>
                    <div id="coachesList"></div>
                    <button class="btn btn-outline" style="width:100%; font-size:12px; margin-top:5px; border-color:#ff9800; color:#ff9800;" onclick="addCoach()">+ مدرب</button>
                    <h5 style="color:#9b59b6; margin: 15px 0 10px 0;">🤝 العمال والشركاء:</h5>
                    <div id="staffList"></div>
                    <button class="btn btn-outline" style="width:100%; font-size:12px; margin-top:5px; border-color:#9b59b6; color:#9b59b6;" onclick="addStaff()">+ عامل/شريك</button>
                </div>
            </div>

            <!-- الصندوق 2: البرنامج -->
            <div class="accordion-item">
                <div class="accordion-header" onclick="toggleAccordion('accProg')">
                    <span>📋 برنامج الحفل (<span id="totalProgCount">0</span> فقرات)</span>
                    <span id="icon_accProg">➕</span>
                </div>
                <div id="accProg" class="accordion-content">
                    <div id="programList"></div>
                    <button class="btn btn-red" style="width:100%; margin-top:15px;" onclick="addProgramItem()">+ إضافة فقرة جديدة للبرنامج</button>
                </div>
            </div>

            <button class="btn btn-green" style="width:100%; margin-top:20px; font-size: 18px;" onclick="saveBackstageData()">💾 حفظ التعديلات كاملة</button>
        </div>

        <!-- 2. الركح (Live) -->
        <div id="stageSection" style="display:none; margin-top:20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color:var(--primary-red); margin: 0;">🎭 الركح (Live)</h3>
                <button class="btn btn-dark" onclick="closeSection()">رجوع</button>
            </div>
            <div id="teleprompterView" style="text-align: right; background: #fffdf5; padding: 20px; border-radius: 12px; border: 2px solid #ffc107; font-size: 18px; line-height: 1.8; font-weight: bold; margin-bottom: 20px;"></div>
            <div id="liveProgramTimeline" style="text-align: right;"></div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyCTTjp34QhF6MPNemwKhoq7385xnJKK_Hg", authDomain: "becha-events-kids.firebaseapp.app", databaseURL: "https://becha-events-kids-default-rtdb.europe-west1.firebasedatabase.app", projectId: "becha-events-kids", storageBucket: "becha-events-kids.appspot.com", messagingSenderId: "763935242130", appId: "1:763935242130:web:490a99e38c53ba0240f34b" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null; let currentEventIndex = -1; let currentEventData = null; let liveProgRef = null;

        function updateClock() { let n = new Date(); document.getElementById('live-clock').innerText = `🕒 ${n.toLocaleTimeString('ar-TN', {hour:'2-digit', minute:'2-digit'})}`; }
        setInterval(updateClock, 1000);

        function toggleAccordion(id) {
            let el = document.getElementById(id); let icon = document.getElementById('icon_'+id);
            if(el.classList.contains('open')) { el.classList.remove('open'); icon.innerText = '➕'; }
            else { 
                document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('open'));
                document.querySelectorAll('.accordion-header span[id^="icon_"]').forEach(i => i.innerText = '➕');
                el.classList.add('open'); icon.innerText = '➖';
            }
        }

        // تسجيل الدخول
        function login() {
            let u = document.getElementById('loginUser').value.trim(); let p = document.getElementById('loginPass').value.trim();
            if(u === "حمادي" && p === "amouhfy2025") { currentUser = { pseudo: "حمادي", role: "admin", linkedEmpName: "المدير حمادي" }; finishLogin(); }
            else { db.ref('BechaEventsData/users').once('value', snap => {
                let all = snap.val() || {}; let f = Object.keys(all).find(k => all[k].pseudo === u && all[k].pass === p);
                if(f) { currentUser = all[f]; finishLogin(); } else alert("❌ خطأ!");
            }); }
        }

        function finishLogin() {
            document.getElementById('mainAppHeader').style.display = 'block'; document.getElementById('headerUserBadge').innerText = currentUser.pseudo;
            db.ref('BechaEventsData/events').once('value', snap => {
                let events = snap.val() || []; let today = new Date().toISOString().slice(0, 10);
                let list = document.getElementById('eventsListContainer'); list.innerHTML = '';
                events.forEach((ev, i) => { if(ev.date >= today) {
                    list.innerHTML += `<div class="event-card" onclick="selectEvent(${i})" style="background:white; padding:15px; margin-bottom:10px; border-radius:10px; cursor:pointer; text-align:right; border-right:5px solid var(--primary-red);"><b>${ev.name}</b><br><small>${ev.date}</small></div>`;
                }});
                showScreen('eventsScreen');
            });
        }

        function selectEvent(idx) {
            currentEventIndex = idx; db.ref('BechaEventsData/events/'+idx).on('value', snap => {
                currentEventData = snap.val(); 
                document.getElementById('dashInstName').innerText = currentEventData.name;
                document.getElementById('dashEventTime').innerText = `📅 ${currentEventData.date} | 🕒 ${currentEventData.time || '--'}`;
                renderDashboard();
            });
        }

        function renderDashboard() {
            let m = document.getElementById('dashboardMenu'); m.innerHTML = '';
            m.innerHTML = `<div class="dash-card" onclick="openInnerSection('backstageSection')">🧰 الكواليس</div>
                           <div class="dash-card" onclick="openInnerSection('stageSection')">🎭 الركح</div>`;
            showScreen('dashboardScreen');
        }

        function openInnerSection(id) { 
            document.getElementById('dashboardMenu').style.display = 'none'; 
            document.getElementById(id).style.display = 'block'; 
            if(id === 'backstageSection') { loadBackstageData(); toggleAccordion('accProg'); }
            if(id === 'stageSection') renderStageLive();
        }

        function closeSection() { 
            document.getElementById('backstageSection').style.display = 'none'; 
            document.getElementById('stageSection').style.display = 'none'; 
            document.getElementById('dashboardMenu').style.display = 'grid'; 
        }

        // ================== الكواليس ==================
        function addEducator(n='') { document.getElementById('educatorsList').insertAdjacentHTML('beforeend', `<div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" class="edu-name" value="${n}" style="flex:1;"><button onclick="this.parentElement.remove()">🗑</button></div>`); }
        function addCoach(s='', n='') { document.getElementById('coachesList').insertAdjacentHTML('beforeend', `<div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" class="coach-spec" placeholder="الاختصاص" value="${s}" style="flex:1;"><input type="text" class="coach-name" placeholder="الاسم" value="${n}" style="flex:1;"><button onclick="this.parentElement.remove()">🗑</button></div>`); }
        function addStaff(r='', n='') { document.getElementById('staffList').insertAdjacentHTML('beforeend', `<div style="display:flex; gap:5px; margin-bottom:5px;"><input type="text" class="staff-role" placeholder="الصفة" value="${r}" style="flex:1;"><input type="text" class="staff-name" placeholder="الاسم" value="${n}" style="flex:1;"><button onclick="this.parentElement.remove()">🗑</button></div>`); }

        function addProgramItem(t='', d='', comp=false, customType='') {
            let container = document.getElementById('programList');
            let idx = container.children.length;
            let opts = ['تلاوة قرآن', 'نشيد / كورال', 'لوحة راقصة / استعراض', 'مسرحية', 'تنشيط وألغاز', 'تكريم', 'أخرى'];
            let optsHtml = opts.map(o => `<option value="${o}" ${t===o?'selected':''}>${o}</option>`).join('');
            
            let lockedClass = comp ? 'locked' : '';
            let showOther = (t === 'أخرى') ? 'block' : 'none';

            let html = `
                <div class="prog-row ${lockedClass}" data-index="${idx}">
                    <div class="row-num">${idx+1}</div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-dark" style="padding:2px 8px;" onclick="moveItem(this, -1)">⬆️</button>
                        <button class="btn btn-dark" style="padding:2px 8px;" onclick="moveItem(this, 1)">⬇️</button>
                        <select class="prog-type" onchange="checkOther(this)" style="flex:1;">${optsHtml}</select>
                        <button class="btn btn-green" style="padding:2px 8px;" onclick="syncOneItem(this)">🔄</button>
                        <button class="btn btn-red" style="padding:2px 8px;" onclick="this.parentElement.parentElement.remove(); updateNumbers();">🗑</button>
                    </div>
                    <input type="text" class="other-type" placeholder="اكتب نوع الفقرة..." value="${customType}" style="display:${showOther}; margin-top:5px;">
                    <input type="text" class="prog-details" placeholder="تفاصيل الفقرة (اختياري)..." value="${d}" style="margin-top:5px;">
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            updateNumbers();
        }

        function checkOther(sel) { sel.parentElement.nextElementSibling.style.display = (sel.value === 'أخرى') ? 'block' : 'none'; }
        
        function updateNumbers() {
            let rows = document.querySelectorAll('.prog-row');
            document.getElementById('totalProgCount').innerText = rows.length;
            rows.forEach((r, i) => r.querySelector('.row-num').innerText = i+1);
        }

        function moveItem(btn, dir) {
            let row = btn.closest('.prog-row');
            if(dir === -1 && row.previousElementSibling) row.parentNode.insertBefore(row, row.previousElementSibling);
            if(dir === 1 && row.nextElementSibling) row.parentNode.insertBefore(row.nextElementSibling, row);
            updateNumbers();
        }

        function loadBackstageData() {
            ['educatorsList', 'coachesList', 'staffList', 'programList'].forEach(id => document.getElementById(id).innerHTML = '');
            let d = currentEventData.institutionDetails || {};
            document.getElementById('instManager').value = d.managerName || '';
            document.getElementById('instFounder').value = d.founderName || '';
            if(d.educators) d.educators.forEach(n => addEducator(n));
            if(d.coaches) d.coaches.forEach(c => addCoach(c.spec, c.name));
            if(d.staff) d.staff.forEach(s => addStaff(s.role, s.name));
            let p = currentEventData.eventProgram || [];
            p.forEach(i => addProgramItem(i.type, i.details, i.completed, i.customType));
        }

        function saveBackstageData() {
            let d = { managerName: document.getElementById('instManager').value.trim(), founderName: document.getElementById('instFounder').value.trim(), educators: [], coaches: [], staff: [] };
            document.querySelectorAll('#educatorsList .edu-name').forEach(e => d.educators.push(e.value.trim()));
            document.querySelectorAll('#coachesList > div').forEach(r => d.coaches.push({spec: r.querySelector('.coach-spec').value, name: r.querySelector('.coach-name').value}));
            document.querySelectorAll('#staffList > div').forEach(r => d.staff.push({role: r.querySelector('.staff-role').value, name: r.querySelector('.staff-name').value}));
            
            let prog = [];
            document.querySelectorAll('.prog-row').forEach(r => {
                let type = r.querySelector('.prog-type').value;
                prog.push({
                    type: type,
                    customType: type === 'أخرى' ? r.querySelector('.other-type').value.trim() : '',
                    details: r.querySelector('.prog-details').value.trim(),
                    completed: r.classList.contains('locked')
                });
            });
            db.ref('BechaEventsData/events/'+currentEventIndex+'/institutionDetails').set(d);
            db.ref('BechaEventsData/events/'+currentEventIndex+'/eventProgram').set(prog).then(() => alert("✅ تم الحفظ والتحيين!"));
        }

        function syncOneItem(btn) {
            let r = btn.closest('.prog-row');
            let idx = Array.from(r.parentNode.children).indexOf(r);
            let type = r.querySelector('.prog-type').value;
            let data = {
                type: type,
                customType: type === 'أخرى' ? r.querySelector('.other-type').value.trim() : '',
                details: r.querySelector('.prog-details').value.trim(),
                completed: r.classList.contains('locked')
            };
            db.ref('BechaEventsData/events/'+currentEventIndex+'/eventProgram/'+idx).set(data).then(() => {
                btn.innerText = '✅'; setTimeout(() => btn.innerText = '🔄', 1000);
            });
        }

        // ================== الركح (Live) ==================
        function renderStageLive() {
            let d = currentEventData.institutionDetails || {}; let inst = currentEventData.name;
            let html = `على سلامتكم الناس الكل، مرحبا بيكم في <b>${inst}</b>.<br>نشكرو المديرة الفاضلة <b>${d.managerName || ''}</b> وباعث المشروع <b>${d.founderName || ''}</b>...`;
            document.getElementById('teleprompterView').innerHTML = html;

            let pContainer = document.getElementById('liveProgramTimeline'); pContainer.innerHTML = '';
            let prog = currentEventData.eventProgram || [];
            prog.forEach((item, idx) => {
                let displayType = item.type === 'أخرى' ? item.customType : item.type;
                let isComp = item.completed ? 'completed' : '';
                pContainer.innerHTML += `
                    <div class="program-item ${isComp}" onclick="toggleStep(${idx}, ${!!item.completed})">
                        <span>${idx+1}. ${displayType} ${item.details ? '- ' + item.details : ''}</span>
                        <div class="chk-box">${item.completed ? '✔' : ''}</div>
                    </div>`;
            });
        }

        function toggleStep(idx, state) {
            db.ref('BechaEventsData/events/'+currentEventIndex+'/eventProgram/'+idx+'/completed').set(!state);
        }

        function logout() { location.reload(); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); }
    </script>
</body>
</html>
